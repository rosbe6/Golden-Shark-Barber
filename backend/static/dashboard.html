<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Gold Shark Barber</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <!-- PANTALLA LOGIN -->
    <div class="screen login-screen" id="screenLogin">
        <div class="login-container">
            <h1>Barber Dashboard</h1>
            <p>Gold Shark Barber</p>

            <form id="formLogin" class="login-form">
                <input type="email" id="inputEmail" placeholder="Email" required>
                <input type="password" id="inputPassword" placeholder="Password" required>
                <button type="submit" class="btn-primary">Sign In</button>
                <div id="errorLogin" class="error-box hidden"></div>
            </form>
        </div>
    </div>

    <!-- PANTALLA DASHBOARD -->
    <div class="screen dashboard-screen hidden" id="screenDashboard">
        <!-- HEADER -->
        <div class="dashboard-top">
            <h1>Dashboard</h1>
            <div class="top-right">
                <span id="textNombre"></span>
                <button id="btnLogout" class="btn-logout">Logout</button>
            </div>
        </div>

        <!-- STATS -->
        <div class="stats-box">
            <div class="stat">
                <div class="stat-num" id="statToday">0</div>
                <div class="stat-label">Today</div>
            </div>
            <div class="stat">
                <div class="stat-num" id="statWeek">0</div>
                <div class="stat-label">This Week</div>
            </div>
            <div class="stat">
                <div class="stat-num" id="statCompleted">0</div>
                <div class="stat-label">Completed</div>
            </div>
            <div class="stat">
                <div class="stat-num" id="statTotal">0</div>
                <div class="stat-label">Total</div>
            </div>
        </div>

        <!-- CITAS -->
        <div class="citas-container">
            <h2>Appointments</h2>

            <div class="filter-box">
                <button class="filter-tab active" data-filter="all">All</button>
                <button class="filter-tab" data-filter="today">Today</button>
                <button class="filter-tab" data-filter="week">Week</button>
                <button class="filter-tab" data-filter="completed">Completed</button>
            </div>

            <div id="citasBox" class="citas-grid">
                <!-- Se llenan dinámicamente -->
            </div>

            <div id="emptyBox" class="empty-msg hidden">No appointments</div>
        </div>
    </div>

    <!-- MODAL: DETALLES DE CITA -->
    <div class="modal hidden" id="modalDetails">
        <div class="modal-box">
            <button class="close-modal" onclick="closeDetailsModal()">×</button>
            <h2>Appointment Details</h2>

            <div class="details-table">
                <div class="detail-row">
                    <span class="detail-key">Client</span>
                    <span class="detail-val" id="detClient"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-key">Email</span>
                    <span class="detail-val" id="detEmail"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-key">Phone</span>
                    <span class="detail-val" id="detPhone"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-key">Date</span>
                    <span class="detail-val" id="detDate"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-key">Time</span>
                    <span class="detail-val" id="detTime"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-key">Service</span>
                    <span class="detail-val" id="detService"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-key">Price</span>
                    <span class="detail-val" id="detPrice"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-key">Status</span>
                    <span class="detail-val" id="detStatus"></span>
                </div>
            </div>

            <div class="modal-buttons">
                <button class="btn-action green" id="btnMarcaCompletada">Mark Complete</button>
                <button class="btn-action orange" id="btnReagendar">Reschedule</button>
                <button class="btn-action red" id="btnCancelarCita">Cancel</button>
            </div>
        </div>
    </div>

    <!-- MODAL: CANCELAR CITA -->
    <div class="modal hidden" id="modalCancel">
        <div class="modal-box small">
            <button class="close-modal" onclick="closeCancelModal()">×</button>
            <h2>Cancel Appointment</h2>
            <textarea id="textCancelReason" placeholder="Reason..."></textarea>
            <div class="modal-buttons">
                <button class="btn-action red" id="btnConfirmCancel">Confirm</button>
                <button class="btn-action gray" onclick="closeCancelModal()">Close</button>
            </div>
        </div>
    </div>

    <!-- MODAL: REAGENDAR CITA -->
    <div class="modal hidden" id="modalReschedule">
        <div class="modal-box small">
            <button class="close-modal" onclick="closeRescheduleModal()">×</button>
            <h2>Reschedule Appointment</h2>
            <input type="date" id="inputNewDate">
            <select id="selectNewTime">
                <option value="">Select time...</option>
            </select>
            <input type="text" id="inputRescheduleReason" placeholder="Reason...">
            <div class="modal-buttons">
                <button class="btn-action green" id="btnConfirmReschedule">Confirm</button>
                <button class="btn-action gray" onclick="closeRescheduleModal()">Close</button>
            </div>
        </div>
    </div>

    <!-- LOADING -->
    <div class="loading hidden" id="loadingSpinner">
        <div class="spinner"></div>
    </div>

    <script src="js/dashboard.js"></script>a
</body>
</html>
