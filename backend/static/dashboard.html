<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Gold Shark Barber</title>
    <link rel="stylesheet" href="css/dashboard.css"></head>
<body>
    <!-- MODAL CONFIRMACIÓN -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <h3 id="modal-titulo">Confirm Action</h3>
            <p id="modal-mensaje">Are you sure?</p>
            <div class="modal-actions">
                <button class="btn-modal-cancel" onclick="cerrarModal()">Cancel</button>
                <button class="btn-modal-confirm" onclick="confirmarAccion()">Confirm</button>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- PANTALLA 1: LOGIN -->
        <div id="pantalla-login" class="pantalla">
            <h1>Barber Login</h1>
            <form id="form-login">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email-input" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password-input" required>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
            <div id="error-login" class="hidden error"></div>
        </div>

        <!-- PANTALLA 2: DASHBOARD -->
        <div id="pantalla-dashboard" class="pantalla hidden">
            <div class="header">
                <h1>Dashboard</h1>
                <button class="btn-logout" onclick="cerrarSesion()">Logout</button>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="verTab('hoy')">Today</button>
                <button class="tab-btn" onclick="verTab('todas')">All</button>
                <button class="tab-btn" onclick="verTab('completadas')">Completed</button>
                <button class="tab-btn" onclick="verTab('canceladas')">Cancelled</button>
            </div>

            <div id="contenido-dashboard"></div>
        </div>
    </div>

    <script src="js/dashboard.js"></script>
</body>
</html>
