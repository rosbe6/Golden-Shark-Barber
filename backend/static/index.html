<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon - Golden Shark Barber</title>
    <meta name="description" content="Golden Shark Barber is coming soon. Professional haircuts and grooming services in Seattle, WA.">
    
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/favicon.ico">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            color: #333;
            line-height: 1.6;
            width: 100%;
            overflow-x: hidden;
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
        }

        button {
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .coming-soon {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #000 0%, #1a1a1a 100%);
            color: white;
            padding: 20px;
        }

        .coming-soon-content {
            text-align: center;
            max-width: 600px;
        }

        .coming-soon-logo {
            width: 200px;
            height: 200px;
            object-fit: contain;
            margin-bottom: 30px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .coming-soon-content h1 {
            font-size: 56px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #d4af37;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .coming-soon-subtitle {
            font-size: 18px;
            color: #ddd;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .coming-soon-date {
            font-size: 24px;
            color: #d4af37;
            font-weight: 600;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* EMAIL FORM */
        .coming-soon-form {
            display: flex;
            gap: 10px;
            margin: 30px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .coming-soon-form input {
            padding: 12px 20px;
            border: 2px solid #d4af37;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 4px;
            font-size: 14px;
            min-width: 250px;
        }

        .coming-soon-form input::placeholder {
            color: #999;
        }

        .btn-notify {
            padding: 12px 30px;
            background: #d4af37;
            color: #000;
            border: 2px solid #d4af37;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-notify:hover {
            background: transparent;
            color: #d4af37;
        }

        /* SOCIAL LINKS */
        .coming-soon-social {
            margin: 30px 0;
        }

        .coming-soon-social a {
            display: inline-block;
            margin: 0 15px;
            transition: all 0.3s ease;
        }

        .coming-soon-social a:hover {
            transform: scale(1.2);
            filter: brightness(1.2);
        }

        .coming-soon-message {
            font-size: 14px;
            color: #999;
            margin-top: 20px;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .coming-soon {
                height: auto;
                min-height: 100vh;
                padding: 60px 20px;
            }

            .coming-soon-content h1 {
                font-size: 40px;
            }

            .coming-soon-subtitle {
                font-size: 16px;
            }

            .coming-soon-date {
                font-size: 20px;
            }

            .coming-soon-form {
                flex-direction: column;
            }

            .coming-soon-form input {
                min-width: 100%;
            }

            .coming-soon-logo {
                width: 150px;
                height: 150px;
            }
        }

        @media (max-width: 480px) {
            .coming-soon-content h1 {
                font-size: 32px;
            }

            .coming-soon-subtitle {
                font-size: 14px;
            }

            .coming-soon-date {
                font-size: 18px;
            }

            .coming-soon-logo {
                width: 120px;
                height: 120px;
            }

            .btn-notify {
                padding: 10px 20px;
                font-size: 12px;
            }

            .coming-soon-form input {
                padding: 10px 15px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

<!-- COMING SOON SECTION -->
<section class="coming-soon">
    <div class="coming-soon-content">
        <img src="images/logo.jpeg" alt="Gold Shark Barber" class="coming-soon-logo">
        
        <h1>Coming Soon</h1>
        <p class="coming-soon-subtitle">Golden Shark Barber is preparing something amazing for you</p>
        
        <p class="coming-soon-date">July 2026</p>

        <!-- EMAIL SUBSCRIPTION -->
        <div class="coming-soon-form">
            <input type="email" id="emailInput" placeholder="Enter your email">
            <button onclick="subscribeEmail()" class="btn-notify">Notify Me</button>
        </div>

        <!-- SOCIAL LINKS -->
        <div class="coming-soon-social">
            <a href="https://www.instagram.com/golden_sharkb" target="_blank" title="Instagram">
                <img src="images/ig.svg" alt="Instagram" style="width: 40px; height: 40px;">
            </a>
        </div>

        <p class="coming-soon-message">Follow us on social media for updates</p>
    </div>
</section>

<script>
    function subscribeEmail() {
        const email = document.getElementById('emailInput').value;
        if (email) {
            alert('Thanks! We will notify you when we launch.');
            document.getElementById('emailInput').value = '';
        } else {
            alert('Please enter your email.');
        }
    }
</script>

</body>
</html>
